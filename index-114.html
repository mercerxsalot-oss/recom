<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECAP CONTROL ROOM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #090b0f;
    --surface:   #0e1118;
    --card:      #131820;
    --border:    #1e2a38;
    --accent:    #ff6b35;
    --accent2:   #00d4ff;
    --green:     #00ff88;
    --yellow:    #ffd166;
    --red:       #ff4757;
    --text:      #c8d6e5;
    --muted:     #4a5568;
    --font-head: 'Barlow Condensed', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    position: relative;
  }
  .dot.online {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── layout ── */
  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 58px);
  }

  /* ── sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── channel list ── */
  .channel-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .channel-tag {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent2);
  }

  .channel-tag button {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0.6;
    transition: opacity .2s;
  }
  .channel-tag button:hover { opacity: 1; }

  .add-channel-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  input[type="text"], textarea, select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.08);
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 8px 16px;
    text-transform: uppercase;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.04); border-color: var(--muted); }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-accent:hover { background: #e85e2a; border-color: #e85e2a; }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-cyan {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-cyan:hover { background: rgba(0,212,255,0.08); }

  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #e0532a);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 3px;
    padding: 14px;
    text-transform: uppercase;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .btn-generate:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,107,53,0.35); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1));
  }

  /* ── toggle ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .toggle-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .toggle {
    width: 44px; height: 24px;
    background: var(--border);
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    border: none;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
  }
  .toggle.on::after { transform: translateX(20px); }

  /* ── episodes panel ── */
  .episodes-panel {
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .panel-title {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
  }

  .episodes-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .episode-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all .2s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .episode-card:hover {
    border-color: var(--accent2);
    background: rgba(0,212,255,0.03);
    transform: translateX(2px);
  }

  .ep-title {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .ep-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 12px;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge-draft     { background: rgba(255,209,102,0.12); color: var(--yellow); border: 1px solid rgba(255,209,102,0.2); }
  .badge-published { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .badge-posted    { background: rgba(0,212,255,0.1); color: var(--accent2); border: 1px solid rgba(0,212,255,0.2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; }

  /* ── stats bar ── */
  .stats-bar {
    display: flex;
    gap: 20px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val {
    font-family: var(--font-head);
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-key {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ── modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    transition: color .2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .form-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  textarea#ep-content {
    min-height: 260px;
    resize: vertical;
    font-size: 13px;
    line-height: 1.6;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
  }

  .modal-footer-left  { display: flex; gap: 10px; }
  .modal-footer-right { display: flex; gap: 10px; }

  .btn-publish {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    font-weight: 700;
  }
  .btn-publish:hover { background: #00e07a; border-color: #00e07a; color: #000; }

  .btn-delete {
    border-color: var(--red);
    color: var(--red);
  }
  .btn-delete:hover { background: rgba(255,71,87,0.08); }

  /* ── toast ── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    z-index: 9000;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error   { border-color: var(--red); color: var(--red); }

  /* ── loader ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ─────────────── HEADER ─────────────── -->
<header>
  <div class="logo">📺 Recap <span>Control</span></div>
  <div class="header-right">
    <div class="status-dot">
      <div class="dot" id="bot-dot"></div>
      <span id="bot-status">CHECKING...</span>
    </div>
  </div>
</header>

<!-- ─────────────── MAIN ─────────────── -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Stats -->
    <div>
      <div class="section-label">Overview</div>
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-val" id="stat-total">—</div>
          <div class="stat-key">Episodes</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-drafts">—</div>
          <div class="stat-key">Drafts</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-posted">—</div>
          <div class="stat-key">Posted</div>
        </div>
      </div>
    </div>

    <!-- Channels to scan -->
    <div>
      <div class="section-label">Channels to Scan</div>
      <div class="channel-list" id="channel-list"></div>
      <div class="add-channel-row" style="margin-top:8px">
        <input type="text" id="new-channel-id" placeholder="Channel ID (e.g. 1234567890)">
        <button class="btn btn-cyan btn-sm" onclick="addChannel()">+ Add</button>
      </div>
    </div>

    <!-- Post to -->
    <div>
      <div class="section-label">Post Episodes To</div>
      <input type="text" id="post-channel-id" placeholder="Channel ID for #recap-room">
    </div>

    <!-- Auto schedule -->
    <div>
      <div class="section-label">Auto Schedule</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Weekly Auto-Generate</div>
          <div class="toggle-sub">Runs every Sunday at 9:00 UTC</div>
        </div>
        <button class="toggle" id="schedule-toggle" onclick="toggleSchedule()"></button>
      </div>
    </div>

    <!-- Save config -->
    <button class="btn btn-cyan" onclick="saveConfig()" style="width:100%">
      💾 &nbsp;Save Config
    </button>

    <div style="border-top:1px solid var(--border); padding-top:20px">
      <button class="btn-generate" id="generate-btn" onclick="triggerGenerate()">
        ⚡ &nbsp;Generate Now
      </button>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;margin-top:8px">
        Bot reads channels → AI writes episode → Appears as draft above
      </div>
    </div>

  </aside>

  <!-- EPISODES PANEL -->
  <div class="episodes-panel">
    <div class="panel-header">
      <div class="panel-title">Episodes</div>
      <div id="last-updated" style="font-family:var(--font-mono);font-size:11px;color:var(--muted)"></div>
    </div>
    <div class="episodes-grid" id="episodes-list">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Loading episodes...</div>
      </div>
    </div>
  </div>

</div>

<!-- ─────────────── EPISODE MODAL ─────────────── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Episode</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">Episode Title</div>
        <input type="text" id="ep-title" placeholder="Episode title...">
      </div>
      <div class="form-group">
        <div class="form-label">Content</div>
        <textarea id="ep-content" placeholder="Episode content..."></textarea>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);display:flex;gap:16px" id="ep-meta-display"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-left">
        <button class="btn btn-delete btn-sm" onclick="deleteEpisode()">🗑 Delete</button>
      </div>
      <div class="modal-footer-right">
        <button class="btn btn-sm" onclick="saveDraft()">💾 Save Draft</button>
        <button class="btn btn-publish btn-sm" onclick="publishEpisode()" id="publish-btn">
          🚀 Publish to Discord
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ─────────────── TOAST ─────────────── -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG — fill these in
// ═══════════════════════════════════════════════════════
const SUPABASE_URL  = "https://wgreuchukixtpxtrybrd.supabase.co";
const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndncmV1Y2h1a2l4dHB4dHJ5YnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTAxNTcsImV4cCI6MjA5MDc4NjE1N30.umDES9YfV4SUiVp7GbU05vwMXPt8G5_5fkCbMUKgfho";
// ═══════════════════════════════════════════════════════

var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentEpisodeId = null;
var configId         = null;
var scheduleActive   = true;
var channelIds       = [];
var allEpisodes      = [];

// ── init ──────────────────────────────────────────────
async function init() {
  await loadConfig();
  await loadEpisodes();
  setInterval(loadEpisodes, 15000);
  updateBotStatus();
}

// ── config ────────────────────────────────────────────
async function loadConfig() {
  try {
    const { data } = await db.from("recap_config").select("*").limit(1);
    if (!data || !data.length) return;
    const cfg = data[0];
    configId       = cfg.id;
    channelIds     = cfg.channels_to_scan || [];
    scheduleActive = cfg.is_active;
    document.getElementById("post-channel-id").value = cfg.post_channel_id || "";
    renderChannels();
    renderToggle();
  } catch (e) { console.error("loadConfig:", e); }
}

async function saveConfig() {
  const postCh = document.getElementById("post-channel-id").value.trim();
  try {
    if (configId) {
      await db.from("recap_config").update({
        channels_to_scan: channelIds,
        post_channel_id: postCh,
        is_active: scheduleActive,
        updated_at: new Date().toISOString()
      }).eq("id", configId);
    } else {
      const { data } = await db.from("recap_config").insert({
        channels_to_scan: channelIds,
        post_channel_id: postCh,
        is_active: scheduleActive
      }).select();
      if (data) configId = data[0].id;
    }
    toast("Config saved ✓", "success");
  } catch (e) { toast("Save failed: " + e.message, "error"); }
}

function addChannel() {
  const inp = document.getElementById("new-channel-id");
  const val = inp.value.trim();
  if (!val) return;
  if (channelIds.includes(val)) { toast("Already added", "error"); return; }
  channelIds.push(val);
  inp.value = "";
  renderChannels();
}

function removeChannel(id) {
  channelIds = channelIds.filter(c => c !== id);
  renderChannels();
}

function renderChannels() {
  const el = document.getElementById("channel-list");
  if (!channelIds.length) {
    el.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">No channels added yet</div>`;
    return;
  }
  el.innerHTML = channelIds.map(id =>
    `<div class="channel-tag">
      <span># ${id}</span>
      <button onclick="removeChannel('${id}')">×</button>
    </div>`
  ).join("");
}

function toggleSchedule() {
  scheduleActive = !scheduleActive;
  renderToggle();
}

function renderToggle() {
  const t = document.getElementById("schedule-toggle");
  t.className = "toggle" + (scheduleActive ? " on" : "");
}

// ── episodes ──────────────────────────────────────────
async function loadEpisodes() {
  try {
    const { data } = await db.from("recap_episodes")
      .select("*")
      .order("created_at", { ascending: false });
    allEpisodes = data || [];
    renderEpisodes();
    renderStats();
    document.getElementById("last-updated").textContent =
      "Updated " + new Date().toLocaleTimeString();
  } catch (e) { console.error("loadEpisodes:", e); }
}

function renderEpisodes() {
  const el = document.getElementById("episodes-list");
  if (!allEpisodes.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No episodes yet — hit Generate Now</div>
      </div>`;
    return;
  }

  el.innerHTML = allEpisodes.map(ep => {
    const badge = ep.posted
      ? `<span class="badge badge-posted">Posted</span>`
      : ep.status === "published"
      ? `<span class="badge badge-published">Published</span>`
      : `<span class="badge badge-draft">Draft</span>`;

    const weekStr = ep.week_start
      ? `${ep.week_start} → ${ep.week_end}`
      : "—";

    return `
      <div class="episode-card" onclick="openEpisode('${ep.id}')">
        <div>
          <div class="ep-title">${ep.title || "Untitled Episode"}</div>
          <div class="ep-meta">
            <span>📅 ${weekStr}</span>
            <span>🕐 ${timeAgo(ep.created_at)}</span>
          </div>
        </div>
        <div>${badge}</div>
      </div>`;
  }).join("");
}

function renderStats() {
  document.getElementById("stat-total").textContent  = allEpisodes.length;
  document.getElementById("stat-drafts").textContent = allEpisodes.filter(e => e.status === "draft").length;
  document.getElementById("stat-posted").textContent = allEpisodes.filter(e => e.posted).length;
}

// ── episode modal ─────────────────────────────────────
function openEpisode(id) {
  const ep = allEpisodes.find(e => e.id === id);
  if (!ep) return;
  currentEpisodeId = id;

  document.getElementById("ep-title").value   = ep.title || "";
  document.getElementById("ep-content").value = ep.content || "";

  const badge = ep.posted
    ? `<span class="badge badge-posted">Posted to Discord</span>`
    : ep.status === "published"
    ? `<span class="badge badge-published">Published — waiting for bot</span>`
    : `<span class="badge badge-draft">Draft</span>`;

  document.getElementById("ep-meta-display").innerHTML = `
    ${badge}
    <span>Week: ${ep.week_start || "—"} → ${ep.week_end || "—"}</span>
    <span>Created: ${timeAgo(ep.created_at)}</span>`;

  // Disable publish if already posted
  const pubBtn = document.getElementById("publish-btn");
  pubBtn.disabled = ep.posted;
  pubBtn.textContent = ep.posted ? "✅ Already Posted" : "🚀 Publish to Discord";

  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  currentEpisodeId = null;
}

async function saveDraft() {
  if (!currentEpisodeId) return;
  try {
    await db.from("recap_episodes").update({
      title:   document.getElementById("ep-title").value,
      content: document.getElementById("ep-content").value,
    }).eq("id", currentEpisodeId);
    toast("Draft saved ✓", "success");
    await loadEpisodes();
  } catch (e) { toast("Save failed", "error"); }
}

async function publishEpisode() {
  if (!currentEpisodeId) return;
  try {
    await db.from("recap_episodes").update({
      title:   document.getElementById("ep-title").value,
      content: document.getElementById("ep-content").value,
      status:  "published",
    }).eq("id", currentEpisodeId);
    toast("Published! Bot will post it within 1 min ⚡", "success");
    closeModal();
    await loadEpisodes();
  } catch (e) { toast("Publish failed", "error"); }
}

async function deleteEpisode() {
  if (!currentEpisodeId) return;
  if (!confirm("Delete this episode?")) return;
  try {
    await db.from("recap_episodes").delete().eq("id", currentEpisodeId);
    toast("Episode deleted", "success");
    closeModal();
    await loadEpisodes();
  } catch (e) { toast("Delete failed", "error"); }
}

// ── trigger generate ──────────────────────────────────
async function triggerGenerate() {
  const btn = document.getElementById("generate-btn");
  btn.disabled  = true;
  btn.innerHTML = `<span class="spinner"></span> Triggering Bot...`;

  try {
    await db.from("recap_triggers").insert({ processed: false });
    toast("Bot triggered! Episode will appear as draft in ~30 seconds ⚡", "success");
    setTimeout(() => loadEpisodes(), 30000);
    setTimeout(() => loadEpisodes(), 60000);
  } catch (e) {
    toast("Trigger failed: " + e.message, "error");
  } finally {
    setTimeout(() => {
      btn.disabled  = false;
      btn.innerHTML = "⚡ &nbsp;Generate Now";
    }, 5000);
  }
}

// ── bot status check ──────────────────────────────────
async function updateBotStatus() {
  // Check if bot processed a trigger recently (within 5 min)
  const { data } = await db.from("recap_triggers")
    .select("*")
    .eq("processed", true)
    .order("created_at", { ascending: false })
    .limit(1);

  const dot = document.getElementById("bot-dot");
  const lbl = document.getElementById("bot-status");

  if (data && data.length) {
    const lastRun = new Date(data[0].created_at);
    const diffMin = (Date.now() - lastRun) / 60000;
    dot.className = "dot online";
    lbl.textContent = `BOT ACTIVE • Last run ${Math.round(diffMin)}m ago`;
  } else {
    dot.className = "dot";
    lbl.textContent = "BOT STATUS UNKNOWN";
  }
}

// ── utils ─────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return "—";
  const diff = Date.now() - new Date(iso);
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0) return `${d}d ago`;
  if (h > 0) return `${h}h ago`;
  if (m > 0) return `${m}m ago`;
  return "just now";
}

let toastTimer;
function toast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 3500);
}

// Close modal on overlay click
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ── boot ──────────────────────────────────────────────
init();
</script>
</body>
</html>
